services:
  organizational-structure:
    build:
      context: .
    container_name: service
    ports:
      - "8080:8080"
    environment:
      GOOSE_DRIVER: postgres
      GOOSE_DBSTRING: "host=postgres user=postgres password=password dbname=org_str sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:15-alpine
    container_name: postgres-in
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: org_str
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U postgres -d org_str",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata: