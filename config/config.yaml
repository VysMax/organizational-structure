server:
  host: "localhost"
  port: "8080"
  shutdown_timeout: 30s
  read_timeout: 5s
  write_timeout: 10s
  idle_timeout: 120s

database:
  host: "localhost"
  port: 5432
  db_name: "org_str"
  user: "postgres"
  password: "password"
  ssl_mode: "disable"
  pool_max_conns: 4
  pool_min_conns: 0
  pool_max_conn_lifetime: 1h
  pool_max_conn_idle_time: 30m
  pool_health_check_period: 1m
  pool_max_conn_lifetime_jitter: 0

logger:
  level: "debug"
  file: "logs/logs.log"